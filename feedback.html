<!doctype html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Feedback | BlueKeys</title>
  <link rel="icon" type="image/x-icon" href="assets/logo/logo%20.ico" />
  <meta name="description" content="Send feedback to the BlueKeys team. We'd love to hear from you." />


  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Tailwind config MUST come after the CDN script -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#000000",
            secondary: "#8ecae6",
            accent: "#8ecae6",
            surface: "#FFFFFF",
            "on-surface": "#1a1a1a",
            "surface-container-low": "hsla(197, 60%, 93%, 0.4)",
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "9999px",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <!-- Shared styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="font-body text-on-surface antialiased overflow-x-hidden min-h-screen flex flex-col">

  <!-- Back navigation -->
  <a href="index.html"
    class="fixed top-6 left-6 z-50 flex items-center gap-2 text-xs font-bold tracking-widest uppercase text-primary/50 hover:text-primary transition-colors group">
    <span
      class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
    Back
  </a>

  <!-- Ambient background glows -->
  <div
    class="fixed top-1/4 -left-20 w-[500px] h-[500px] bg-[#8ecae6]/10 rounded-full blur-[120px] -z-10 transform-gpu pointer-events-none">
  </div>
  <div
    class="fixed bottom-0 right-0 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] -z-10 transform-gpu pointer-events-none">
  </div>

  <!-- Main content -->
  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-lg">

      <!-- Header -->
      <div class="mb-6">
        <p class="text-xs font-bold tracking-[0.3em] uppercase text-secondary mb-3">BlueKeys</p>
        <h1 class="font-headline font-extrabold text-4xl md:text-5xl text-primary leading-tight tracking-tight">
          Send Feedback
        </h1>
        <p class="mt-2 text-primary/60 font-light leading-relaxed text-sm">
          We'd love to hear your thoughts, ideas, or bug reports.
        </p>
      </div>

      <!-- Global success banner -->
      <div data-fs-success
        class="hidden mb-6 flex items-center gap-3 bg-[#8ecae6]/20 border border-[#8ecae6]/40 text-primary rounded-xl px-5 py-4 text-sm font-medium">
        <span class="material-symbols-outlined text-[20px] text-secondary">check_circle</span>
        <span>Thanks for your feedback!</span>
      </div>

      <!-- Global error banner -->
      <div data-fs-error
        class="hidden mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-5 py-4 text-sm font-medium">
        <span class="material-symbols-outlined text-[20px]">error</span>
        <span>Something went wrong. Please try again.</span>
      </div>

      <!-- Form -->
      <form id="feedback-form" class="space-y-4" action="https://formspree.io/f/mzdwrapv" method="POST" novalidate>

        <!-- Name -->
        <div>
          <label for="name" class="block text-xs font-bold tracking-widest uppercase text-primary/50 mb-2">Name</label>
          <input type="text" id="name" name="name" data-fs-field required placeholder="Your name"
            class="w-full bg-white/70 border border-black/10 rounded-xl px-4 py-2.5 text-sm text-primary placeholder-primary/30 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-all aria-invalid:border-red-400 aria-invalid:ring-red-200" />
          <span data-fs-error="name" class="mt-1.5 block text-xs text-red-500 font-medium"></span>
        </div>

        <!-- Reaction Emoji Rating -->
        <div>
          <label class="block text-xs font-bold tracking-widest uppercase text-primary/50 mb-2">How's your
            experience?</label>
          <div class="flex items-center justify-between gap-1">
            <input type="hidden" id="feeling" name="feeling" value="" data-fs-field />

            <button type="button" data-emoji="sad"
              class="emoji-btn group flex flex-col items-center gap-0.5 p-1 rounded-lg hover:bg-black/5 active:scale-95 transition-all flex-1"
              title="Sad">
              <span class="text-3xl sm:text-[32px] transition-transform duration-300 group-hover:scale-125">😢</span>
              <span class="text-[9px] sm:text-[10px] font-bold text-primary/40 uppercase tracking-wider">Sad</span>
            </button>

            <button type="button" data-emoji="meh"
              class="emoji-btn group flex flex-col items-center gap-0.5 p-1 rounded-lg hover:bg-black/5 active:scale-95 transition-all flex-1"
              title="Meh">
              <span class="text-3xl sm:text-[32px] transition-transform duration-300 group-hover:scale-125">😕</span>
              <span class="text-[9px] sm:text-[10px] font-bold text-primary/40 uppercase tracking-wider">Meh</span>
            </button>

            <button type="button" data-emoji="ok"
              class="emoji-btn group flex flex-col items-center gap-0.5 p-1 rounded-lg hover:bg-black/5 active:scale-95 transition-all flex-1"
              title="Okay">
              <span class="text-3xl sm:text-[32px] transition-transform duration-300 group-hover:scale-125">😐</span>
              <span class="text-[9px] sm:text-[10px] font-bold text-primary/40 uppercase tracking-wider">Okay</span>
            </button>

            <button type="button" data-emoji="good"
              class="emoji-btn group flex flex-col items-center gap-0.5 p-1 rounded-lg hover:bg-black/5 active:scale-95 transition-all flex-1"
              title="Good">
              <span class="text-3xl sm:text-[32px] transition-transform duration-300 group-hover:scale-125">🙂</span>
              <span class="text-[9px] sm:text-[10px] font-bold text-primary/40 uppercase tracking-wider">Good</span>
            </button>

            <button type="button" data-emoji="love"
              class="emoji-btn group flex flex-col items-center gap-0.5 p-1 rounded-lg hover:bg-black/5 active:scale-95 transition-all flex-1"
              title="Amazing">
              <span class="text-3xl sm:text-[32px] transition-transform duration-300 group-hover:scale-125">😄</span>
              <span class="text-[9px] sm:text-[10px] font-bold text-primary/40 uppercase tracking-wider">Amazing</span>
            </button>
          </div>
          <span data-fs-error="feeling" class="mt-1.5 block text-xs text-red-500 font-medium"></span>
        </div>

        <!-- Message -->
        <div>
          <label for="message"
            class="block text-xs font-bold tracking-widest uppercase text-primary/50 mb-2">Feedback</label>
          <!-- Category Selection Cards -->
          <div>
            <input type="hidden" id="category" name="category" value="" data-fs-field />
            <div class="grid grid-cols-4 gap-1.5 sm:gap-3">
              <!-- Bug Report Card -->
              <button type="button" data-category="Bug Report"
                class="category-card flex items-center justify-center py-1.5 px-3 sm:py-2 sm:px-5 bg-white/70 border border-black/10 rounded-lg hover:bg-black/5 active:scale-[0.98] transition-all w-full">
                <span
                  class="text-[10px] sm:text-xs font-bold text-primary/80 uppercase tracking-wider truncate">Bug</span>
              </button>

              <!-- Add Feature Card -->
              <button type="button" data-category="Add Feature"
                class="category-card flex items-center justify-center py-1.5 px-3 sm:py-2 sm:px-5 bg-white/70 border border-black/10 rounded-lg hover:bg-black/5 active:scale-[0.98] transition-all w-full">
                <span
                  class="text-[10px] sm:text-xs font-bold text-primary/80 uppercase tracking-wider truncate">Feature</span>
              </button>

              <!-- Error Card -->
              <button type="button" data-category="Error"
                class="category-card flex items-center justify-center py-1.5 px-3 sm:py-2 sm:px-5 bg-white/70 border border-black/10 rounded-lg hover:bg-black/5 active:scale-[0.98] transition-all w-full">
                <span class="text-[10px] sm:text-xs font-bold text-primary/80 uppercase tracking-wider truncate">Crash
                  Report</span>
              </button>

              <!-- Other Card -->
              <button type="button" data-category="Other"
                class="category-card flex items-center justify-center py-1.5 px-3 sm:py-2 sm:px-5 bg-white/70 border border-black/10 rounded-lg hover:bg-black/5 active:scale-[0.98] transition-all w-full">
                <span
                  class="text-[10px] sm:text-xs font-bold text-primary/80 uppercase tracking-wider truncate">Other</span>
              </button>
            </div>
            <span data-fs-error="category" class="mt-1.5 block text-xs text-red-500 font-medium"></span>
          </div>

          <textarea id="message" name="message" data-fs-field required rows="8"
            placeholder="Tell us what's on your mind…"
            class="w-full bg-white/70 border border-black/10 rounded-xl px-4 py-2.5 text-sm text-primary placeholder-primary/30 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-all resize-none aria-invalid:border-red-400 aria-invalid:ring-red-200"></textarea>
          <span data-fs-error="message" class="mt-1.5 block text-xs text-red-500 font-medium"></span>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" data-fs-submit-btn
          class="relative group w-full overflow-hidden bg-primary text-white px-8 py-3 text-sm font-bold tracking-[0.2em] uppercase rounded-full transition-all duration-500 btn-shadow hover:-translate-y-0.5 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed disabled:translate-y-0">
          <span class="relative z-10 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[18px]">send</span>
            SEND Feedback
          </span>
          <div
            class="absolute inset-0 bg-gradient-to-r from-neutral-800 to-neutral-600 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          </div>
        </button>

      </form>

    </div>
  </main>

  <!-- Native AJAX Submission and Visual helper script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const feedbackForm = document.getElementById('feedback-form');

      // Category Selection Selector Logic
      const categoryCards = document.querySelectorAll('.category-card');
      const categoryInput = document.getElementById('category');
      const categoryError = document.querySelector('[data-fs-error="category"]');

      // Emoji Rating Selector Logic
      const emojiBtns = document.querySelectorAll('.emoji-btn');
      const feelingInput = document.getElementById('feeling');

      // Form Validation Logic (Name and Feedback are compulsory)
      const nameInput = document.getElementById('name');
      const nameError = document.querySelector('[data-fs-error="name"]');
      const messageInput = document.getElementById('message');
      const messageError = document.querySelector('[data-fs-error="message"]');

      function validateName() {
        if (nameInput && nameError) {
          if (!nameInput.value.trim()) {
            nameError.textContent = 'Name is required.';
            nameInput.setAttribute('aria-invalid', 'true');
            return false;
          } else {
            nameError.textContent = '';
            nameInput.removeAttribute('aria-invalid');
            return true;
          }
        }
        return true;
      }

      function validateCategory() {
        if (categoryInput && categoryError) {
          if (!categoryInput.value) {
            categoryError.textContent = 'Please select a category.';
            return false;
          } else {
            categoryError.textContent = '';
            return true;
          }
        }
        return true;
      }

      function validateMessage() {
        if (messageInput && messageError) {
          if (!messageInput.value.trim()) {
            messageError.textContent = 'Feedback message is required.';
            messageInput.setAttribute('aria-invalid', 'true');
            return false;
          } else {
            messageError.textContent = '';
            messageInput.removeAttribute('aria-invalid');
            return true;
          }
        }
        return true;
      }

      if (nameInput) {
        nameInput.addEventListener('blur', validateName);
        nameInput.addEventListener('input', () => {
          if (nameInput.value.trim()) {
            nameError.textContent = '';
            nameInput.removeAttribute('aria-invalid');
          }
        });
      }

      if (messageInput) {
        messageInput.addEventListener('blur', validateMessage);
        messageInput.addEventListener('input', () => {
          if (messageInput.value.trim()) {
            messageError.textContent = '';
            messageInput.removeAttribute('aria-invalid');
          }
        });
      }

      if (feedbackForm) {
        feedbackForm.addEventListener('submit', async (e) => {
          const isNameValid = validateName();
          const isCategoryValid = validateCategory();
          const isMessageValid = validateMessage();

          if (!isNameValid || !isCategoryValid || !isMessageValid) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return;
          }

          // Custom Native AJAX Submit using Fetch to handle errors gracefully
          e.preventDefault();
          e.stopImmediatePropagation();

          const submitBtn = document.getElementById('submit-btn');
          const successBanner = document.querySelector('[data-fs-success]');
          const errorBanner = document.querySelector('[data-fs-error]');
          const errorText = errorBanner ? errorBanner.querySelector('span:last-child') : null;

          // Show loading state
          if (submitBtn) {
            submitBtn.disabled = true;
            const btnSpan = submitBtn.querySelector('span.relative');
            if (btnSpan) btnSpan.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span> Sending...';
          }

          // Hide previous alerts
          if (successBanner) successBanner.classList.add('hidden');
          if (errorBanner) errorBanner.classList.add('hidden');

          try {
            const formData = new FormData(feedbackForm);

            // Send as clean application/json to prevent 400 Errors on Formspree Free accounts
            const data = {};
            formData.forEach((value, key) => {
              data[key] = value;
            });

            const response = await fetch("https://formspree.io/f/mzdwrapv", {
              method: "POST",
              body: JSON.stringify(data),
              headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              }
            });

            const result = await response.json();

            if (response.ok) {
              // Successful submission
              if (successBanner) successBanner.classList.remove('hidden');
              feedbackForm.reset();
            } else {
              // Server validation / limitation errors
              console.error("Formspree Server Error Response:", result);
              let errorMsg = 'Something went wrong. Please try again.';
              if (result.errors && result.errors.length > 0) {
                errorMsg = result.errors.map(err => err.message).join(', ');
              } else if (result.error) {
                errorMsg = result.error;
              }

              if (response.status === 400 && errorMsg.toLowerCase().includes('email')) {
                errorMsg = 'A valid email field is required by Formspree.';
              }

              if (errorText) errorText.textContent = errorMsg;
              if (errorBanner) errorBanner.classList.remove('hidden');
            }
          } catch (err) {
            console.error("Formspree Connection Network Error:", err);
            if (errorText) errorText.textContent = 'Connection error. Please check your internet and try again.';
            if (errorBanner) errorBanner.classList.remove('hidden');
          } finally {
            // Restore submit button state
            if (submitBtn) {
              submitBtn.disabled = false;
              const btnSpan = submitBtn.querySelector('span.relative');
              if (btnSpan) {
                btnSpan.innerHTML = `
                    <span class="material-symbols-outlined text-[18px]">send</span>
                    SEND Feedback
                  `;
              }
            }
          }
        }, true); // useCapture to execute first
      }

      if (categoryCards.length > 0 && categoryInput) {
        categoryCards.forEach(card => {
          card.addEventListener('click', function () {
            const value = this.getAttribute('data-category');
            categoryInput.value = value;

            if (categoryError) {
              categoryError.textContent = '';
            }

            // Clear previous active states
            categoryCards.forEach(c => {
              c.classList.remove('bg-[#8ecae6]/20', 'border-[#8ecae6]', 'ring-1', 'ring-[#8ecae6]/30');
              c.classList.add('bg-white/70', 'border-black/10');
            });

            // Add active state to selected
            this.classList.remove('bg-white/70', 'border-black/10');
            this.classList.add('bg-[#8ecae6]/20', 'border-[#8ecae6]', 'ring-1', 'ring-[#8ecae6]/30');
          });
        });
      }

      if (emojiBtns.length > 0 && feelingInput) {
        emojiBtns.forEach(btn => {
          btn.addEventListener('click', function () {
            const value = this.getAttribute('data-emoji');
            const isAlreadySelected = this.classList.contains('bg-[#8ecae6]/20');

            // Clear previous active states on all buttons
            emojiBtns.forEach(b => {
              b.classList.remove('bg-[#8ecae6]/20', 'ring-1', 'ring-[#8ecae6]/30');
              const emo = b.querySelector('span:first-child');
              const lbl = b.querySelector('span:last-child');
              emo.classList.remove('scale-125');
              lbl.classList.remove('text-primary');
              lbl.classList.add('text-primary/40');
            });

            if (isAlreadySelected) {
              feelingInput.value = '';
            } else {
              feelingInput.value = value;
              // Add active state to selected
              this.classList.add('bg-[#8ecae6]/20', 'ring-1', 'ring-[#8ecae6]/30');
              const emo = this.querySelector('span:first-child');
              const lbl = this.querySelector('span:last-child');
              emo.classList.add('scale-125');
              lbl.classList.remove('text-primary/40');
              lbl.classList.add('text-primary');
            }
          });
        });
      }

      if (feedbackForm) {
        feedbackForm.addEventListener('reset', function () {
          resetCategoryCards();
          resetEmojiRating();
          resetValidationErrors();
        });
      }

      function resetCategoryCards() {
        if (categoryInput) {
          categoryInput.value = '';
          categoryCards.forEach(c => {
            c.classList.remove('bg-[#8ecae6]/20', 'border-[#8ecae6]', 'ring-1', 'ring-[#8ecae6]/30');
            c.classList.add('bg-white/70', 'border-black/10');
          });
        }
      }

      function resetEmojiRating() {
        if (feelingInput) {
          feelingInput.value = '';
          emojiBtns.forEach(b => {
            b.classList.remove('bg-[#8ecae6]/20', 'ring-1', 'ring-[#8ecae6]/30');
            const emo = b.querySelector('span:first-child');
            const lbl = b.querySelector('span:last-child');
            emo.classList.remove('scale-125');
            lbl.classList.remove('text-primary');
            lbl.classList.add('text-primary/40');
          });
        }
      }

      function resetValidationErrors() {
        if (nameInput && nameError) {
          nameError.textContent = '';
          nameInput.removeAttribute('aria-invalid');
        }
        if (categoryError) {
          categoryError.textContent = '';
        }
        if (messageInput && messageError) {
          messageError.textContent = '';
          messageInput.removeAttribute('aria-invalid');
        }
      }
    });
  </script>


</body>

</html>
